name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Android Debug APK
        run: ./gradlew :androidApp:assembleDebug --no-daemon

  lint:
    name: Spotless Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Spotless check
        run: ./gradlew spotlessCheck --no-daemon

  # Job 2: Run tests specifically for the Wasm target
  test:
    name: Unit Tests (Wasm)
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Wasm Unit Tests
        run: ./gradlew :composeApp:wasmJsBrowserTest --no-daemon

  # Job 3: Measure Coverage & Perform Detailed JVM Testing
  measure-coverage:
    name: Measure Coverage (JVM)
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate Coverage Report
        run: ./gradlew :composeApp:jvmTest :composeApp:jacocoJvmTestReport :composeApp:jacocoJvmTestCoverageVerification --no-daemon

      - name: Upload Coverage Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            composeApp/build/reports/jacoco/jacocoJvmTestReport/html/
            composeApp/build/reports/jacoco/jacocoJvmTestReport/jacocoJvmTestReport.xml

      - name: Jacoco Report
        uses: madrapps/jacoco-report@v1.7.1
        with:
          paths: composeApp/build/reports/jacoco/jacocoJvmTestReport/jacocoJvmTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 40
          min-coverage-changed-files: 60

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Detekt
        run: ./gradlew detekt --no-daemon || true
        continue-on-error: true

      - name: Upload Detekt Reports
        uses: actions/upload-artifact@v4
        with:
          name: detekt-reports
          path: composeApp/build/reports/detekt/

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [lint]
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: 'trivy-results.sarif'

  build-web-production:
    name: Build Web Production Bundle
    runs-on: ubuntu-latest
    needs: [security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      FLEET_API_BASE_URL: ${{ secrets.FLEET_API_BASE_URL_PROD }}
      FLEET_WS_BASE_URL: ${{ secrets.FLEET_WS_BASE_URL_PROD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Validate production web environment
        run: |
          test -n "$FLEET_API_BASE_URL"
          test -n "$FLEET_WS_BASE_URL"

      - name: Build Wasm production bundle
        run: ./gradlew :composeApp:wasmJsBrowserDistribution --no-daemon

      - name: Inject production runtime config
        run: |
          cat > composeApp/build/dist/wasmJs/productionExecutable/config.js <<EOF
          window.__FLEET_CONFIG__ = {
            apiBaseUrl: "${FLEET_API_BASE_URL}",
            wsBaseUrl: "${FLEET_WS_BASE_URL}"
          };
          EOF

      - name: Upload web production artifact
        uses: actions/upload-artifact@v4
        with:
          name: fleet-management-backoffice-web-dist
          path: composeApp/build/dist/wasmJs/productionExecutable/

  deploy-web-render:
    name: Deploy Web To Render
    runs-on: ubuntu-latest
    needs: [build-web-production]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
    steps:
      - name: Validate Render deploy hook
        run: test -n "$RENDER_DEPLOY_HOOK_URL"

      - name: Trigger Render deployment
        run: curl --fail --silent --show-error --request POST "$RENDER_DEPLOY_HOOK_URL"

  